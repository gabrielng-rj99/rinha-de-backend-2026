services:
  lb:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.builder
      target: lb
    ports:
      - "9999:9999"
    deploy:
      resources:
        limits:
          cpus: "0.02"
          memory: 8M
    volumes:
      - sockets:/sockets
    networks:
      - rinha
    environment:
      - INSTANCE=

  api1:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.builder
      target: api
    deploy:
      resources:
        limits:
          cpus: "0.49"
          memory: 169M
    volumes:
      - sockets:/sockets
    networks:
      - rinha
    environment:
      - INSTANCE=1
      - GOGC=-1
      - GOMEMLIMIT=160MiB

  api2:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.builder
      target: api
    deploy:
      resources:
        limits:
          cpus: "0.49"
          memory: 169M
    volumes:
      - sockets:/sockets
    networks:
      - rinha
    environment:
      - INSTANCE=2
      - GOGC=-1
      - GOMEMLIMIT=160MiB

volumes:
  sockets:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=4m

networks:
  rinha:
    driver: bridge
